[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "--cov=src --cov=handler --cov-report=term-missing --cov-report=xml -v"

[tool.coverage.run]
source = ["src", "handler"]
relative_files = true

[tool.coverage.report]
show_missing = true
